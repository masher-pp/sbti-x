<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBTI 性癖测试</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #08080c;
            --bg-card: rgba(255, 250, 240, 0.04);
            --bg-card-solid: #131318;
            --bg-glass: rgba(255, 250, 240, 0.06);
            --border: rgba(201, 169, 110, 0.15);
            --border-active: rgba(201, 169, 110, 0.5);
            --gold: #c9a96e;
            --gold-dim: #8a7444;
            --gold-bright: #e8d5a8;
            --text: #e8e4dc;
            --text-dim: #8a8578;
            --text-body: #c4bfb4;
            --coral: #d4776b;
            --radius: 16px;
            --radius-sm: 10px;
            --shadow: 0 24px 80px rgba(0, 0, 0, 0.5);
            --font-display: 'Ma Shan Zheng', cursive;
            --font-serif: 'Noto Serif SC', 'Songti SC', 'SimSun', serif;
            --font-body: 'Noto Serif SC', -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
            --bg-glow-1: rgba(201, 169, 110, 0.04);
            --bg-glow-2: rgba(212, 119, 107, 0.03);
            --noise-opacity: 0.03;
            --hero-watermark: rgba(201, 169, 110, 0.04);
            --option-bg: rgba(255, 250, 240, 0.02);
            --option-hover-bg: rgba(201, 169, 110, 0.05);
            --option-selected-bg: rgba(201, 169, 110, 0.08);
            --answered-bg: rgba(201, 169, 110, 0.04);
            --badge-bg: rgba(201, 169, 110, 0.1);
            --progress-bg: rgba(201, 169, 110, 0.1);
            --progress-glow: rgba(201, 169, 110, 0.3);
            --btn-primary-bg: linear-gradient(135deg, var(--gold) 0%, #a8874a 100%);
            --btn-primary-text: #0a0a0f;
            --btn-primary-shadow: rgba(201, 169, 110, 0.25);
            --btn-outline-hover-bg: rgba(201, 169, 110, 0.08);
            --poster-glow: rgba(201, 169, 110, 0.04);
            --poster-no-img-bg: linear-gradient(135deg, rgba(201, 169, 110, 0.12), rgba(201, 169, 110, 0.04));
            --note-bg: rgba(212, 119, 107, 0.05);
            --note-border: rgba(212, 119, 107, 0.12);
            --dim-item-bg: rgba(255, 250, 240, 0.02);
            --scrollbar-track: var(--bg-deep);
            --selection-bg: rgba(201, 169, 110, 0.3);
        }

        [data-theme="light"] {
            --bg-deep: #f4efe6;
            --bg-card: rgba(255, 255, 255, 0.85);
            --bg-card-solid: #ffffff;
            --bg-glass: rgba(255, 255, 255, 0.7);
            --border: rgba(120, 90, 40, 0.12);
            --border-active: rgba(120, 90, 40, 0.35);
            --gold: #8a6d3b;
            --gold-dim: #a8905c;
            --gold-bright: #5c4a28;
            --text: #2a2520;
            --text-dim: #8c8278;
            --text-body: #4a4038;
            --coral: #c0564a;
            --shadow: 0 24px 80px rgba(80, 60, 30, 0.1);
            --bg-glow-1: rgba(201, 169, 110, 0.06);
            --bg-glow-2: rgba(212, 150, 130, 0.04);
            --noise-opacity: 0.015;
            --hero-watermark: rgba(120, 90, 40, 0.04);
            --option-bg: rgba(255, 255, 255, 0.6);
            --option-hover-bg: rgba(138, 109, 59, 0.06);
            --option-selected-bg: rgba(138, 109, 59, 0.1);
            --answered-bg: rgba(138, 109, 59, 0.05);
            --badge-bg: rgba(138, 109, 59, 0.08);
            --progress-bg: rgba(138, 109, 59, 0.12);
            --progress-glow: rgba(138, 109, 59, 0.15);
            --btn-primary-bg: linear-gradient(135deg, #8a6d3b 0%, #6b5330 100%);
            --btn-primary-text: #fff;
            --btn-primary-shadow: rgba(138, 109, 59, 0.2);
            --btn-outline-hover-bg: rgba(138, 109, 59, 0.06);
            --poster-glow: rgba(138, 109, 59, 0.04);
            --poster-no-img-bg: linear-gradient(135deg, rgba(138, 109, 59, 0.1), rgba(138, 109, 59, 0.03));
            --note-bg: rgba(192, 86, 74, 0.05);
            --note-border: rgba(192, 86, 74, 0.12);
            --dim-item-bg: rgba(255, 255, 255, 0.5);
            --scrollbar-track: var(--bg-deep);
            --selection-bg: rgba(138, 109, 59, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            font-family: var(--font-body);
            background: var(--bg-deep);
            color: var(--text);
            line-height: 1.7;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 50% at 20% 20%, var(--bg-glow-1), transparent),
                radial-gradient(ellipse 60% 40% at 80% 80%, var(--bg-glow-2), transparent);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            opacity: var(--noise-opacity, 1);
            pointer-events: none;
            z-index: 0;
        }

        .shell {
            max-width: 640px;
            margin: 0 auto;
            padding: 24px 16px 80px;
            position: relative;
            z-index: 1;
        }

        .screen { display: none; }
        .screen.active { display: block; }

        .card {
            background: var(--bg-card);
            backdrop-filter: blur(40px) saturate(1.2);
            -webkit-backdrop-filter: blur(40px) saturate(1.2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        /* ===================== HERO ===================== */
        .hero {
            padding: 80px 40px 60px;
            text-align: center;
            position: relative;
        }

        .hero::before {
            content: '卜';
            position: absolute;
            top: -40px;
            right: -20px;
            font-family: var(--font-display);
            font-size: 200px;
            color: var(--hero-watermark);
            pointer-events: none;
            line-height: 1;
        }

        .hero-eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--gold);
            border: 1px solid var(--border);
            padding: 8px 18px;
            border-radius: 999px;
            margin-bottom: 32px;
            font-family: var(--font-body);
            font-weight: 600;
        }

        .hero-eyebrow::before {
            content: '◆';
            font-size: 8px;
        }

        .hero-title {
            font-family: var(--font-display);
            font-size: clamp(42px, 8vw, 64px);
            font-weight: 400;
            color: var(--gold-bright);
            line-height: 1.2;
            margin-bottom: 20px;
            letter-spacing: 0.05em;
        }

        .hero-subtitle {
            font-size: 15px;
            color: var(--text-dim);
            margin-bottom: 48px;
            line-height: 1.8;
            max-width: 360px;
            margin-left: auto;
            margin-right: auto;
        }

        .hero-actions {
            display: flex;
            justify-content: center;
            gap: 14px;
        }

        .btn {
            padding: 16px 40px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            font-family: var(--font-body);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 0.05em;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: var(--btn-primary-bg);
            color: var(--btn-primary-text);
            box-shadow: 0 8px 32px var(--btn-primary-shadow);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px var(--btn-primary-shadow);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-outline {
            background: transparent;
            color: var(--gold);
            border: 1px solid var(--border-active);
        }

        .btn-outline:hover {
            background: var(--btn-outline-hover-bg);
            border-color: var(--gold);
        }

        /* ===================== TEST ===================== */
        .test-wrap {
            padding: 28px;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .progress-bar {
            flex: 1;
            height: 6px;
            background: var(--progress-bg);
            border-radius: 999px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--gold-dim), var(--gold));
            border-radius: inherit;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 12px var(--progress-glow);
        }

        .progress-text {
            font-size: 13px;
            color: var(--gold);
            font-weight: 600;
            min-width: 56px;
            text-align: right;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.02em;
        }

        .question-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .question {
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 22px;
            transition: border-color 0.3s ease, background 0.3s ease;
        }

        .question.answered {
            border-color: var(--border-active);
            background: var(--answered-bg);
        }

        .question-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }

        .badge {
            font-size: 11px;
            font-weight: 700;
            color: var(--gold);
            background: var(--badge-bg);
            border: 1px solid var(--border);
            padding: 4px 12px;
            border-radius: 999px;
            letter-spacing: 0.04em;
        }

        .dim-label {
            font-size: 11px;
            color: var(--text-dim);
            letter-spacing: 0.04em;
        }

        .question-title {
            font-size: 16px;
            font-weight: 400;
            color: var(--text);
            margin-bottom: 18px;
            line-height: 1.8;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 18px;
            background: var(--option-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px;
            color: var(--text-body);
            line-height: 1.6;
        }

        .option:hover {
            border-color: var(--border-active);
            background: var(--option-hover-bg);
            transform: translateX(4px);
        }

        .option.selected {
            border-color: var(--gold);
            background: var(--option-selected-bg);
            color: var(--gold-bright);
        }

        .option-code {
            width: 28px;
            height: 28px;
            border: 1.5px solid var(--gold-dim);
            color: var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 12px;
            flex-shrink: 0;
            transition: all 0.2s ease;
        }

        .option.selected .option-code {
            background: var(--gold);
            color: var(--btn-primary-text);
            border-color: var(--gold);
        }

        .option input { display: none; }

        .test-footer {
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

        .test-hint {
            color: var(--text-dim);
            font-size: 13px;
            line-height: 1.7;
        }

        .test-footer .btn { width: 100%; max-width: 300px; }

        /* ===================== RESULT ===================== */
        .result-wrap {
            padding: 32px 28px;
        }

        .result-layout {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .result-top {
            text-align: center;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }

        .type-box { margin-bottom: 8px; }

        .type-kicker {
            font-size: 12px;
            color: var(--gold);
            margin-bottom: 12px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            font-weight: 600;
        }

        .type-name {
            font-family: var(--font-display);
            font-size: clamp(32px, 7vw, 52px);
            font-weight: 400;
            color: var(--gold-bright);
            line-height: 1.2;
            margin-bottom: 12px;
            letter-spacing: 0.04em;
        }

        .type-subname {
            font-size: 13px;
            color: var(--text-dim);
            margin-bottom: 20px;
            line-height: 1.8;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        .match-badge {
            display: inline-block;
            background: var(--badge-bg);
            color: var(--gold);
            border: 1px solid var(--border);
            padding: 8px 20px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.03em;
        }

        .poster-box {
            text-align: center;
            padding: 24px;
            border-radius: var(--radius);
            background: var(--bg-glass);
            border: 1px solid var(--border);
            overflow: hidden;
            position: relative;
        }

        .poster-box::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at center, var(--poster-glow), transparent 70%);
            pointer-events: none;
        }

        .poster-image {
            width: 100%;
            max-width: 340px;
            margin: 0 auto;
            min-height: 200px;
            max-height: 460px;
            object-fit: contain;
            border-radius: var(--radius-sm);
            position: relative;
            z-index: 1;
        }

        .poster-emoji {
            font-size: 120px;
            line-height: 1.2;
            text-align: center;
            width: 100%;
            max-width: 340px;
            margin: 0 auto;
            min-height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.15));
        }

        .poster-caption {
            margin-top: 16px;
            font-family: var(--font-serif);
            font-size: 18px;
            font-weight: 600;
            color: var(--gold-bright);
            line-height: 1.6;
            position: relative;
            z-index: 1;
            font-style: italic;
        }

        .poster-caption::before,
        .poster-caption::after {
            content: '"';
            color: var(--gold-dim);
            font-size: 24px;
            vertical-align: -2px;
        }

        .poster-caption::after { content: '"'; }

        .poster-box.no-image .poster-image { display: none; }

        .poster-box.no-image {
            padding: 60px 28px;
            background: var(--poster-no-img-bg);
        }

        .poster-box.no-image .poster-caption {
            font-family: var(--font-display);
            font-size: clamp(28px, 6vw, 42px);
            font-style: normal;
            color: var(--gold-bright);
        }

        .poster-box.no-image .poster-caption::before,
        .poster-box.no-image .poster-caption::after { content: ''; }

        .result-desc {
            font-size: 15px;
            line-height: 2;
            color: var(--text-body);
            padding: 20px 24px;
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            position: relative;
        }

        .result-desc::before {
            content: '该人格的简单解读';
            display: block;
            font-size: 12px;
            color: var(--gold);
            letter-spacing: 0.1em;
            margin-bottom: 12px;
            font-weight: 700;
        }

        .result-note {
            font-size: 12px;
            color: var(--text-dim);
            text-align: center;
            padding: 14px 20px;
            background: var(--note-bg);
            border: 1px solid var(--note-border);
            border-radius: var(--radius-sm);
            line-height: 1.8;
        }

        /* ===================== DIM SECTION ===================== */
        .dim-section {
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
        }

        .dim-title {
            font-size: 12px;
            color: var(--gold);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 18px;
            text-align: center;
        }

        .dim-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .dim-item {
            background: var(--dim-item-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 16px;
            transition: border-color 0.2s ease;
        }

        .dim-item:hover {
            border-color: var(--border-active);
        }

        .dim-item-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            gap: 8px;
        }

        .dim-item-name {
            font-weight: 700;
            font-size: 14px;
            color: var(--text);
        }

        .dim-item-score {
            font-size: 12px;
            color: var(--gold);
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
        }

        .dim-item p {
            font-size: 13px;
            color: var(--text-dim);
            margin: 0;
            line-height: 1.8;
        }

        .result-actions {
            display: flex;
            gap: 12px;
        }

        .result-actions .btn {
            flex: 1;
        }

        /* ===================== ANIMATIONS ===================== */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        .screen.active .card {
            animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .hero-title {
            background: linear-gradient(90deg, var(--gold-dim), var(--gold-bright), var(--gold), var(--gold-bright), var(--gold-dim));
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 6s linear infinite;
        }

        /* ===================== RESPONSIVE ===================== */
        @media (max-width: 480px) {
            .shell { padding: 14px 10px 60px; }

            .hero {
                padding: 50px 24px 40px;
            }

            .test-wrap,
            .result-wrap {
                padding: 20px 16px;
            }

            .question {
                padding: 18px 16px;
            }

            .question-title {
                font-size: 15px;
            }

            .result-actions {
                flex-direction: column;
            }

            .poster-caption { font-size: 16px; }
        }

        /* ===================== SCROLLBAR ===================== */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--scrollbar-track);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--gold-dim);
            border-radius: 999px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--gold);
        }

        /* ===================== THEME TOGGLE ===================== */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            padding: 0;
            line-height: 1;
        }

        .theme-toggle:hover {
            border-color: var(--border-active);
            transform: scale(1.08);
        }

        .theme-toggle .icon-sun,
        .theme-toggle .icon-moon {
            transition: opacity 0.3s ease, transform 0.3s ease;
            position: absolute;
        }

        .theme-toggle .icon-sun {
            opacity: 0;
            transform: rotate(-90deg) scale(0.5);
        }

        .theme-toggle .icon-moon {
            opacity: 1;
            transform: rotate(0deg) scale(1);
        }

        [data-theme="light"] .theme-toggle .icon-sun {
            opacity: 1;
            transform: rotate(0deg) scale(1);
        }

        [data-theme="light"] .theme-toggle .icon-moon {
            opacity: 0;
            transform: rotate(90deg) scale(0.5);
        }

        /* ===================== THEME TRANSITION ===================== */
        body,
        body::before,
        .card,
        .question,
        .option,
        .option-code,
        .badge,
        .match-badge,
        .poster-box,
        .poster-caption,
        .dim-section,
        .dim-item,
        .result-desc,
        .result-note,
        .btn-primary,
        .btn-outline,
        .hero-eyebrow,
        .progress-bar,
        .progress-fill,
        .theme-toggle {
            transition: background 0.4s ease, color 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
        }

        /* ===================== SELECTION ===================== */
        ::selection {
            background: var(--selection-bg);
            color: var(--gold-bright);
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle" title="切换主题">
        <span class="icon-moon">🌙</span>

            "FAKE": { code: "FAKE", cn: "伪人", intro: `已经，没有人类了。`, desc: `SCP基金会紧急报告：项目编号 SCP-CN-████ "伪人"。在床上，伪人是八面玲珑的存在，因为他们切换角色面具比切换玩具还快。上一秒还是纯情小白兔，下一秒领导来了，瞬间切换成SM女王，连表情和声音都会发生微调。你以为你遇到了一个真心懂你的性伴侣？醒醒。你只是幸运地遇到了一个善于伪装、高性能的床戏仿生人罢了。夜深人静时，伪人把面具一层层摘下来，最后才发现，面具下空得很，正是这些面具构成了自己。` },

            "POOR": { code: "POOR", cn: "贫困者", intro: `我穷，但我很专。`, desc: `恭喜您，您测出了【POOR - 贫困者】性癖。这个"贫困"不是资源丰富与否的判决书，更像一种欲望断舍离后的资源再分配。别人把精力撒成漫天二维码，你把精力压成一束激光，照哪儿，哪儿就开始冒烟。POOR的世界很简单：不重要的玩法一律降噪，重要的玩法狠狠干到底。热闹、社交、虚荣、到处刷存在感？抱歉，没空。你不是资源少，你是把资源全部灌进了一个重口坑里，所以看起来像贫困，实际上像矿井。一旦某件事被你认定值得钻，外界再吵也只是背景杂音。` },

        const DIM_EXPLANATIONS = {
            "S1": { L: `对自己下手比别人还狠，夸你两句你都想先验明真伪。`, M: `自信值随天气波动，顺风能飞，逆风先缩。`, H: `心里对自己大致有数，不太会被路人一句话打散。` },
            "S2": { L: `内心频道雪花较多，常在"我是谁"里循环缓存。`, M: `平时还能认出自己，偶尔也会被情绪临时换号。`, H: `对自己的脾气、欲望和底线都算门儿清。` },
            "S3": { L: `更在意舒服和安全，没必要天天给人生开冲刺模式。`, M: `想上进，也想躺会儿，价值排序经常内部开会。`, H: `很容易被目标、成长或某种重要信念推着往前。` },
            "E1": { L: `感情里警报器灵敏，已读不回都能脑补到大结局。`, M: `一半信任，一半试探，感情里常在心里拉锯。`, H: `更愿意相信关系本身，不会被一点风吹草动吓散。` },
            "E2": { L: `感情投入偏克制，心门不是没开，是门禁太严。`, M: `会投入，但会给自己留后手，不至于全盘梭哈。`, H: `一旦认定就容易认真，情绪和精力都给得很足。` },
            "E3": { L: `容易黏人也容易被黏，关系里的温度感很重要。`, M: `亲密和独立都要一点，属于可调节型依赖。`, H: `空间感很重要，再爱也得留一块属于自己的地。` },
            "A1": { L: `看世界自带防御滤镜，先怀疑，再靠近。`, M: `既不天真也不彻底阴谋论，观望是你的本能。`, H: `更愿意相信人性和善意，遇事不急着把世界判死刑。` },
            "A2": { L: `规则能绕就绕，舒服和自由往往排在前面。`, M: `该守的时候守，该变通的时候也不死磕。`, H: `秩序感较强，能按流程来就不爱即兴炸场。` },
            "A3": { L: `意义感偏低，容易觉得很多事都像在走过场。`, M: `偶尔有目标，偶尔也想摆烂，人生观处于半开机。`, H: `做事更有方向，知道自己大概要往哪边走。` },
            "Ac1": { L: `做事先考虑别翻车，避险系统比野心更先启动。`, M: `有时想赢，有时只想别麻烦，动机比较混合。`, H: `更容易被成果、成长和推进感点燃。` },
            "Ac2": { L: `做决定前容易多转几圈，脑内会议常常超时。`, M: `会想，但不至于想死机，属于正常犹豫。`, H: `拍板速度快，决定一下就不爱回头磨叽。` },
            "Ac3": { L: `执行力和死线有深厚感情，越晚越像要觉醒。`, M: `能做，但状态看时机，偶尔稳偶尔摆。`, H: `推进欲比较强，事情不落地心里都像卡了根刺。` },
            "So1": { L: `社交启动慢热，主动出击这事通常得攒半天气。`, M: `有人来就接，没人来也不硬凑，社交弹性一般。`, H: `更愿意主动打开场子，在人群里不太怕露头。` },
            "So2": { L: `关系里更想亲近和融合，熟了就容易把人划进内圈。`, M: `既想亲近又想留缝，边界感看对象调节。`, H: `边界感偏强，靠太近会先本能性后退半步。` },
            "So3": { L: `表达更直接，心里有啥基本不爱绕。`, M: `会看气氛说话，真实和体面通常各留一点。`, H: `对不同场景的自我切换更熟练，真实感会分层发放。` }
        };

        const dimensionOrder = ['S1', 'S2', 'S3', 'E1', 'E2', 'E3', 'A1', 'A2', 'A3', 'Ac1', 'Ac2', 'Ac3', 'So1', 'So2', 'So3'];
        const DRUNK_TRIGGER_QUESTION_ID = 'drink_gate_q2';

        const app = {
            shuffledQuestions: [],
            answers: {},
            previewMode: false
        };

        const screens = {
            intro: document.getElementById('intro'),
            test: document.getElementById('test'),
            result: document.getElementById('result')
        };

        const questionList = document.getElementById('questionList');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        const submitBtn = document.getElementById('submitBtn');
        const testHint = document.getElementById('testHint');

        function showScreen(name) {
            Object.entries(screens).forEach(([key, el]) => {
                el.classList.toggle('active', key === name);
            });
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function shuffle(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function getVisibleQuestions() {
            const visible = [...app.shuffledQuestions];
            const gateIndex = visible.findIndex(q => q.id === 'drink_gate_q1');
            if (gateIndex !== -1 && app.answers['drink_gate_q1'] === 3) {
                visible.splice(gateIndex + 1, 0, specialQuestions[1]);
            }
            return visible;
        }

        function getQuestionMetaLabel(q) {
            if (q.special) return '补充题';
            return '维度已隐藏';
        }

        function renderQuestions() {
            const visibleQuestions = getVisibleQuestions();
            questionList.innerHTML = '';
            visibleQuestions.forEach((q, index) => {
                const card = document.createElement('div');
                card.className = 'question';
                if (app.answers[q.id] !== undefined) {
                    card.classList.add('answered');
                }
                card.innerHTML = `
                    <div class="question-meta">
                        <div class="badge">第 ${index + 1} 题</div>
                        <div class="dim-label">${getQuestionMetaLabel(q)}</div>
                    </div>
                    <div class="question-title">${q.text}</div>
                    <div class="options">
                        ${q.options.map((opt, i) => {
                            const code = ['A', 'B', 'C', 'D'][i] || String(i + 1);
                            const checked = app.answers[q.id] === opt.value ? 'selected' : '';
                            return `
                                <div class="option ${checked}" data-question="${q.id}" data-value="${opt.value}">
                                    <div class="option-code">${code}</div>
                                    <div>${opt.label}</div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;
                questionList.appendChild(card);
            });

            questionList.querySelectorAll('.option').forEach(opt => {
                opt.addEventListener('click', (e) => {
                    const questionId = opt.dataset.question;
                    const value = Number(opt.dataset.value);
                    app.answers[questionId] = value;

                    if (questionId === 'drink_gate_q1') {
                        if (value !== 3) {
                            delete app.answers['drink_gate_q2'];
                        }
                        renderQuestions();
                        return;
                    }

                    const questionEl = opt.closest('.question');
                    questionEl.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
                    opt.classList.add('selected');
                    questionEl.classList.add('answered');

                    updateProgress();
                });
            });

            updateProgress();
        }

        function updateProgress() {
            const visibleQuestions = getVisibleQuestions();
            const total = visibleQuestions.length;
            const done = visibleQuestions.filter(q => app.answers[q.id] !== undefined).length;
            const percent = total ? (done / total) * 100 : 0;
            progressBar.style.width = `${percent}%`;
            progressText.textContent = `${done} / ${total}`;
            const complete = done === total && total > 0;
            submitBtn.disabled = !complete;
            testHint.textContent = complete
                ? '都做完了。现在可以把你的电子魂魄交给结果页审判。'
                : '全选完才会放行。世界已经够乱了，起码把题做完整。';
        }

        function sumToLevel(score) {
            if (score <= 3) return 'L';
            if (score === 4) return 'M';
            return 'H';
        }

        function levelNum(level) {
            return { L: 1, M: 2, H: 3 }[level];
        }

        function parsePattern(pattern) {
            return pattern.replace(/-/g, '').split('');
        }

        function getDrunkTriggered() {
            return app.answers[DRUNK_TRIGGER_QUESTION_ID] === 2;
        }

        function computeResult() {
            const rawScores = {};
            const levels = {};
            Object.keys(dimensionMeta).forEach(dim => { rawScores[dim] = 0; });

            questions.forEach(q => {
                rawScores[q.dim] += Number(app.answers[q.id] || 0);
            });

            Object.entries(rawScores).forEach(([dim, score]) => {
                levels[dim] = sumToLevel(score);
            });

            const userVector = dimensionOrder.map(dim => levelNum(levels[dim]));
            const ranked = NORMAL_TYPES.map(type => {
                const vector = parsePattern(type.pattern).map(levelNum);
                let distance = 0;
                let exact = 0;
                for (let i = 0; i < vector.length; i++) {
                    const diff = Math.abs(userVector[i] - vector[i]);
                    distance += diff;
                    if (diff === 0) exact += 1;
                }
                const similarity = Math.max(0, Math.round((1 - distance / 30) * 100));
                return { ...type, ...TYPE_LIBRARY[type.code], distance, exact, similarity };
            }).sort((a, b) => {
                if (a.distance !== b.distance) return a.distance - b.distance;
                if (b.exact !== a.exact) return b.exact - a.exact;
                return b.similarity - a.similarity;
            });

            const bestNormal = ranked[0];
            const drunkTriggered = getDrunkTriggered();

            let finalType;
            let modeKicker = '你的主类型';
            let badge = `匹配度 ${bestNormal.similarity}% · 精准命中 ${bestNormal.exact}/15 维`;
            let sub = '维度命中度较高，当前结果可视为你的第一人格画像。';
            let special = false;
            let secondaryType = null;

            if (drunkTriggered) {
                finalType = TYPE_LIBRARY.DRUNK;
                secondaryType = bestNormal;
                modeKicker = '隐藏人格已激活';
                badge = '匹配度 100% · 酒精异常因子已接管';
                sub = '乙醇亲和性过强，系统已直接跳过常规人格审判。';
                special = true;
            } else if (bestNormal.similarity < 60) {
                finalType = TYPE_LIBRARY.HHHH;
                modeKicker = '系统强制兜底';
                badge = `标准人格库最高匹配仅 ${bestNormal.similarity}%`;
                sub = '标准人格库对你的脑回路集体罢工了，于是系统把你强制分配给了 HHHH。';
                special = true;
            } else {
                finalType = bestNormal;
            }

            return {
                rawScores,
                levels,
                ranked,
                bestNormal,
                finalType,
                modeKicker,
                badge,
                sub,
                special,
                secondaryType
            };
        }

        function renderDimList(result) {
            const dimList = document.getElementById('dimList');
            dimList.innerHTML = dimensionOrder.map(dim => {
                const level = result.levels[dim];
                const explanation = DIM_EXPLANATIONS[dim][level];
                return `
                    <div class="dim-item">
                        <div class="dim-item-top">
                            <div class="dim-item-name">${dimensionMeta[dim].name}</div>
                            <div class="dim-item-score">${level} / ${result.rawScores[dim]}分</div>
                        </div>
                        <p>${explanation}</p>
                    </div>
                `;
            }).join('');
        }

        function renderResult() {
            const result = computeResult();
            const type = result.finalType;

            document.getElementById('resultModeKicker').textContent = result.modeKicker;
            document.getElementById('resultTypeName').textContent = `${type.code}（${type.cn}）`;
            document.getElementById('matchBadge').textContent = result.badge;
            document.getElementById('resultTypeSub').textContent = result.sub;
            document.getElementById('resultDesc').textContent = type.desc;
            document.getElementById('posterCaption').textContent = type.intro;
            document.getElementById('funNote').textContent = result.special
                ? '本测试仅供娱乐。隐藏人格和傻乐兜底都属于作者故意埋的损招，请勿把它当成医学、心理学、相学、命理学或灵异学依据。'
                : '本测试仅供娱乐，别拿它当诊断、面试、相亲、分手、招魂、算命或人生判决书。你可以笑，但别太当真。';

            const posterBox = document.getElementById('posterBox');
            const posterEmoji = document.getElementById('posterEmoji');
            const emoji = TYPE_IMAGES[type.code] || '❓';
            posterEmoji.textContent = emoji;

            renderDimList(result);
            showScreen('result');
        }

        function startTest(preview = false) {
            app.previewMode = preview;
            app.answers = {};
            const shuffledRegular = shuffle(questions);
            const insertIndex = Math.floor(Math.random() * shuffledRegular.length) + 1;
            app.shuffledQuestions = [
                ...shuffledRegular.slice(0, insertIndex),
                specialQuestions[0],
                ...shuffledRegular.slice(insertIndex)
            ];
            renderQuestions();
            showScreen('test');
        }

        document.getElementById('startBtn').addEventListener('click', () => startTest(false));
        document.getElementById('backIntroBtn').addEventListener('click', () => showScreen('intro'));
        document.getElementById('submitBtn').addEventListener('click', renderResult);
        document.getElementById('restartBtn').addEventListener('click', () => startTest(false));
        document.getElementById('toTopBtn').addEventListener('click', () => showScreen('intro'));

        (function initTheme() {
            const saved = localStorage.getItem('sbti-theme');
            if (saved) {
                document.documentElement.setAttribute('data-theme', saved);
            }
            document.getElementById('themeToggle').addEventListener('click', () => {
                const current = document.documentElement.getAttribute('data-theme');
                const next = current === 'light' ? 'dark' : 'light';
                if (next === 'dark') {
                    document.documentElement.removeAttribute('data-theme');
                } else {
                    document.documentElement.setAttribute('data-theme', next);
                }
                localStorage.setItem('sbti-theme', next);
            });
        })();
    </script>
</body>
</html>
